name: Robot CI

on:
  push:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: 'zulu'
        cache: 'gradle'
    - name: Build with Gradle
      run: ./gradlew build
#    - name: Build javadoc with Gradle
#      run: ./gradlew javadoc